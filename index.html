<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyStack</title>
    <meta name="description" content="Build, customize, and share your personal digital stack.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="MyStack">
    <meta name="application-name" content="MyStack">
    <meta name="apple-mobile-web-app-title" content="MyStack">
    <meta name="theme-color" content="#f6f6f3">
    <meta name="color-scheme" content="light">
    <meta name="format-detection" content="telephone=no">
    <link rel="canonical" href="https://mystack.jeme.app/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MyStack">
    <meta property="og:title" content="MyStack">
    <meta property="og:description" content="Build, customize, and share your personal digital stack.">
    <meta property="og:url" content="https://mystack.jeme.app/">
    <meta property="og:image" content="https://mystack.jeme.app/assets/og-image.png">
    <meta property="og:image:secure_url" content="https://mystack.jeme.app/assets/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="MyStack personal digital stack builder">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MyStack">
    <meta name="twitter:description" content="Build, customize, and share your personal digital stack.">
    <meta name="twitter:image" content="https://mystack.jeme.app/assets/og-image.png">
    <meta name="twitter:image:alt" content="MyStack personal digital stack builder">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Personal digital stack builder</p>
        <h1>MyStack</h1>
      </div>
    </header>

    <main class="app-shell">
      <section class="builder-panel" aria-labelledby="builderTitle">
        <div class="section-heading">
          <div>
            <h2 id="builderTitle">Choose up to two for each category, then share the stack.</h2>
          </div>
        </div>

        <div id="categoryList" class="category-list"></div>

        <form class="custom-category-form" id="customCategoryForm">
          <input
            type="text"
            name="categoryName"
            maxlength="28"
            placeholder="Category"
            aria-label="Category name"
          >
          <input
            type="text"
            name="appName"
            maxlength="32"
            placeholder="Custom"
            aria-label="Custom name"
          >
          <button type="submit">Add</button>
        </form>
      </section>

      <aside class="preview-panel" aria-labelledby="previewTitle">
        <div class="section-heading compact">
          <div>
            <h2 id="previewTitle">Your stack</h2>
            <p id="selectionCount">0 selected</p>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <span id="selectionProgressBar"></span>
        </div>

        <div class="preview-actions" aria-label="Stack actions">
          <button class="action-button" id="shareButton" type="button">Share link</button>
          <button class="action-button" id="copyImageButton" type="button">Copy image</button>
          <button class="action-button" id="resetButton" type="button">Reset</button>
        </div>

        <canvas id="stackCanvas" width="1200" height="1200" aria-label="Generated MyStack image"></canvas>

        <div class="selected-list" id="selectedList" aria-label="Selected stack"></div>
        <p class="status-message" id="statusMessage" role="status" aria-live="polite"></p>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
